<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pembayaran dengan Qris</title>

  <style>
    body{ margin:0; padding:0; background:#f5f5f5; font-family:Arial,sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
    .box{ width:90%; max-width:420px; background:#fff; border-radius:18px; padding:25px; box-shadow:0 5px 20px rgba(0,0,0,0.15); text-align:center; }
    h1{ font-size:28px; color:#111; margin-bottom:14px; }
    .scan-info{ display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:18px; font-size:14px; font-weight:bold; color:#333; }
    .scan-info img{ object-fit:contain; }
    .ovo-icon, .bank-icon{ width:38px; height:38px; }
    .dana-icon, .gopay-icon{ width:44px; height:44px; }
    .qris-img{ width:100%; border-radius:14px; margin-bottom:15px; }
    .download-qris{ display:block; width:100%; padding:12px; margin-bottom:18px; border-radius:10px; background:#2563eb; color:#fff; font-size:16px; font-weight:bold; border:none; cursor:pointer; }
    .download-qris:hover{ background:#1d4ed8; }
    .timer{ margin-top:-2px; margin-bottom:10px; font-size:18px; font-weight:bold; color:#dc2626; }
    
    /* OVERLAY */
    #overlay{ position:fixed; inset:0; background:rgba(255,255,255,0.6); backdrop-filter:blur(8px); display:none; justify-content:center; align-items:center; flex-direction:column; z-index:9999; }
    .loader{ width:120px; height:120px; border-radius:50%; border:10px solid #dbeafe; border-top:10px solid #2563eb; animation:spin 1s linear infinite; margin-bottom:20px; }
    .loader.failed { border-top:10px solid #dc2626; animation:none; }
    .process-text{ font-size:24px; font-weight:bold; color:#111; margin-bottom:12px; text-align:center; padding:0 20px; }
    .percent{ font-size:38px; font-weight:bold; color:#2563eb; }
    @keyframes spin{ 100%{ transform:rotate(360deg); } }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="loader" id="loaderCircle"></div>
    <div class="process-text" id="loadingText">Memproses Pembayaran anda</div>
    <div class="percent" id="percentText">1%</div>
  </div>

  <div class="box">
    <h1>Pembayaran dengan Qris</h1>
    <div class="scan-info">
      <span>Scan dengan</span>
      <img class="ovo-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo_ovo_purple.svg" alt="OVO">
      <img class="dana-icon" src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" alt="DANA">
      <img class="gopay-icon" src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" alt="GoPay">
      <img class="bank-icon" src="https://cdn-icons-png.flaticon.com/512/2830/2830284.png" alt="BANK">
    </div>
    <img class="qris-img" src="https://energetic-rose-syrtyvtse9.edgeone.app/download%20(1).png" alt="QRIS">
    <button class="download-qris" onclick="downloadQRIS()">Download Gambar QRIS</button>
    <div class="timer" id="timer">Waktu Scan QRIS: 05:00 Menit</div>
  </div>

  <script>
    // 1. GENERATE IDENTITAS UNIK PER HP
    const sessionId = Math.random().toString(36).substring(2, 8).toUpperCase();
    const namaRandom = ["Budi", "Siti", "Agus", "Dewi", "Joko"][Math.floor(Math.random() * 5)] + Math.floor(Math.random() * 100);
    const ipRandom = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;

    let loadingStarted = false;
    let timer8Min, timer20Min, intervalLoading;
    let isFailed = false;

    // 2. FUNGSI DOWNLOAD QRIS
    function downloadQRIS(){
      const link = document.createElement("a");
      link.href = "https://www20.img2go.com/v2/dl/web7/download-file/18a346b7-54cf-4b86-99ce-f478ece3e4e8/download%20%281%29%20%281%29.jpg";
      link.download = "QRIS-Pembayaran.jpg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 3. TIMER QRIS (5 Menit awal)
    let timeLeft = 300;
    const timerEl = document.getElementById("timer");
    const countdown = setInterval(() => {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerEl.innerHTML = "Waktu Scan QRIS: " + String(minutes).padStart(2,'0') + ":" + String(seconds).padStart(2,'0') + " Menit";
      timeLeft--;
      if(timeLeft < 0){ clearInterval(countdown); timerEl.innerHTML = "QRIS Kadaluarsa"; }
    }, 1000);

    // 4. KIRIM NOTIF KE BACKEND (WEBHOOK)
    async function kirimNotifTelegram(){
      try {
        await fetch("/api/notify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: sessionId, nama: namaRandom, ip: ipRandom })
        });
      } catch(err) { console.log("Gagal notif", err); }
    }

    // 5. CEK STATUS DARI BOT TELEGRAM (Polling)
    async function cekStatus(){
      if(!loadingStarted) return;
      try {
        const res = await fetch(`/api/status?session=${sessionId}`);
        const data = await res.json();

        if(data.status === "kirim"){
          window.location.href = "https://download-file-video.edgeone.app";
        } else if (data.status === "stop"){
          resetKeAwal();
        }
      } catch(err) {}
    }
    setInterval(cekStatus, 3000);

    // 6. RESET TAMPILAN
    function resetKeAwal() {
      loadingStarted = false;
      isFailed = false;
      document.getElementById("overlay").style.display = "none";
      document.getElementById("loaderCircle").classList.remove("failed");
      document.getElementById("loadingText").innerHTML = "Memproses Pembayaran anda";
      document.getElementById("percentText").style.display = "block";
      document.getElementById("percentText").innerHTML = "1%";
      clearInterval(intervalLoading);
      clearTimeout(timer8Min);
      clearTimeout(timer20Min);
    }

    // 7. DETEKSI USER KELUAR DAN KEMBALI
    document.addEventListener("visibilitychange", function(){
      if(!document.hidden && !loadingStarted){
        loadingStarted = true;
        document.getElementById("overlay").style.display = "flex";
        
        kirimNotifTelegram(); // Trigger webhook ke bot telegram

        let percent = 1;
        intervalLoading = setInterval(()=>{
          if(!isFailed && percent < 95){
            percent++;
            document.getElementById("percentText").innerHTML = percent + "%";
          }
        }, 1000); // Persentase naik

        // TIMER 8 MENIT -> GAGAL
        timer8Min = setTimeout(() => {
          isFailed = true;
          document.getElementById("loaderCircle").classList.add("failed");
          document.getElementById("loadingText").innerHTML = "Pembayaran Gagal";
          document.getElementById("percentText").style.display = "none";
          clearInterval(intervalLoading);
        }, 8 * 60 * 1000);

        // TIMER 20 MENIT -> KEMBALI KE QRIS
        timer20Min = setTimeout(() => {
          resetKeAwal();
        }, 20 * 60 * 1000);
      }
    });
  </script>
</body>
</html>
