<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pembayaran dengan Qris</title>
  <style>
    body{
      margin:0; padding:0; background:#f5f5f5; font-family:Arial,sans-serif;
      display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden;
    }
    .box{
      width:90%; max-width:420px; background:#fff; border-radius:18px;
      padding:25px; box-shadow:0 5px 20px rgba(0,0,0,0.15); text-align:center;
    }
    h1{ font-size:28px; color:#111; margin-bottom:14px; }
    .scan-info{
      display:flex; justify-content:center; align-items:center; gap:10px;
      flex-wrap:wrap; margin-bottom:18px; font-size:14px; font-weight:bold; color:#333;
    }
    .scan-info img{ object-fit:contain; }
    .ovo-icon{ width:38px; height:38px; }
    .dana-icon{ width:44px; height:44px; }
    .gopay-icon{ width:44px; height:44px; }
    .bank-icon{ width:38px; height:38px; }
    .qris-img{ width:100%; border-radius:14px; margin-bottom:15px; }
    .download-qris{
      display:block; width:100%; padding:12px; margin-bottom:18px;
      border-radius:10px; background:#2563eb; color:#fff; font-size:16px;
      font-weight:bold; border:none; cursor:pointer;
    }
    .download-qris:hover{ background:#1d4ed8; }
    .timer{ margin-top:-2px; margin-bottom:10px; font-size:18px; font-weight:bold; color:#dc2626; }
    
    /* OVERLAY LOADING */
    #overlay{
      position:fixed; inset:0; background:rgba(255,255,255,0.85);
      backdrop-filter:blur(8px); display:none; justify-content:center;
      align-items:center; flex-direction:column; z-index:9999;
    }
    .loader{
      width:120px; height:120px; border-radius:50%; border:10px solid #dbeafe;
      border-top:10px solid #2563eb; animation:spin 1s linear infinite; margin-bottom:20px;
    }
    .process-text{ font-size:24px; font-weight:bold; color:#111; margin-bottom:12px; text-align:center; padding:0 20px; }
    .percent{ font-size:38px; font-weight:bold; color:#2563eb; }
    
    /* POPUP TOAST GAGAL */
    #toastGagal {
      display:none; position:fixed; top:20px; background:#dc2626; color:#fff;
      padding:15px 30px; border-radius:10px; font-weight:bold; font-size:16px;
      box-shadow:0 4px 15px rgba(0,0,0,0.2); z-index:10000; animation:slideDown 0.3s ease;
    }
    @keyframes spin{ 100%{ transform:rotate(360deg); } }
    @keyframes slideDown{ from{ top:-50px; opacity:0; } to{ top:20px; opacity:1; } }
  </style>
</head>
<body>

  <div id="toastGagal">Pembayaran Gagal / Waktu Habis!</div>

  <div id="overlay">
    <div class="loader"></div>
    <div class="process-text" id="loadingText">Memproses Pembayaran anda</div>
    <div class="percent" id="percentText">1%</div>
  </div>

  <div class="box">
    <h1>Pembayaran dengan Qris</h1>
    <div class="scan-info">
      <span>Scan dengan</span>
      <img class="ovo-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo_ovo_purple.svg" alt="OVO">
      <img class="dana-icon" src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" alt="DANA">
      <img class="gopay-icon" src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" alt="GoPay">
      <img class="bank-icon" src="https://cdn-icons-png.flaticon.com/512/2830/2830284.png" alt="BANK">
    </div>

    <img class="qris-img" id="qrisDisplay" src="https://energetic-rose-syrtyvtse9.edgeone.app/download%20(1).png" alt="QRIS">

    <button class="download-qris" onclick="downloadQRIS()">Download Gambar QRIS</button>
    <div class="timer" id="timer">Waktu Scan QRIS: 05:00 Menit</div>
  </div>

  <script>
    let loadingStarted = false;
    let percent = 1;
    let progressInterval;
    let qrisTimeLeft = 300;

    // 1. DETEKSI JENIS SMARTPHONE & DEVICE FINGERPRINTING
    const ua = navigator.userAgent;
    let deviceModel = "Desktop/PC";
    if (/android/i.test(ua)) deviceModel = "Android Smartphone";
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) deviceModel = "iOS iPhone";
    
    // Ganti gambar QRIS berbeda secara otomatis jika device berbeda
    if(deviceModel === "Android Smartphone") {
      document.getElementById("qrisDisplay").src = "https://energetic-rose-syrtyvtse9.edgeone.app/download%20(1).png"; // Atur gambar QRIS khusus Android
    } else if(deviceModel === "iOS iPhone") {
      document.getElementById("qrisDisplay").src = "https://energetic-rose-syrtyvtse9.edgeone.app/download%20(1).png"; // Atur gambar QRIS khusus iOS
    }

    // 2. DOWNLOAD QRIS FUNCTION
    function downloadQRIS(){
      const link = document.createElement("a");
      link.href = document.getElementById("qrisDisplay").src;
      link.download = "QRIS-Pembayaran.jpg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 3. TIMER NORMAL QRIS (5 MENIT)
    const timerElement = document.getElementById("timer");
    const countdown = setInterval(() => {
      const minutes = Math.floor(qrisTimeLeft / 60);
      const seconds = qrisTimeLeft % 60;
      timerElement.innerHTML = `Waktu Scan QRIS: ${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')} Menit`;
      qrisTimeLeft--;
      if(qrisTimeLeft < 0){
        clearInterval(countdown);
        timerElement.innerHTML = "QRIS Kadaluarsa";
      }
    }, 1000);

    // 4. TRIGGER EVENT: PENGGUNA KELUAR & KEMBALI KE HALAMAN
    document.addEventListener("visibilitychange", function() {
      if (!document.hidden && !loadingStarted) {
        loadingStarted = true;
        document.getElementById("overlay").style.display = "flex";
        
        // Kirim spesifikasi HP ke API trigger backend
        fetch("/api/trigger", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ device: deviceModel })
        });

        // Simulasi hitung persentase loading naik perlahan sampai max 95% (bisa bertahan 10 menit)
        progressInterval = setInterval(() => {
          if (percent < 95) {
            percent++;
            document.getElementById("percentText").innerHTML = percent + "%";
          }
        }, 6300); // 6.3 detik per % agar mencapai 95% dalam waktu kisaran 10 menit
      }
    });

    // 5. POLLING STATUS KE BACKEND (CEK SETIAP 2 DETIK)
    async function cekStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();

        // Jika perintah / webhook menyatakan sukses
        if (data.mode === "paid") {
          clearInterval(progressInterval);
          document.getElementById("percentText").innerHTML = "100%";
          document.getElementById("loadingText").innerHTML = "Pembayaran Selesai";
          
          setTimeout(() => {
            // Mengalihkan halaman ke tautan rahasia yang dikirim dari GitHub API backend
            window.location.href = data.redirectUrl; 
          }, 1500);
        }

        // Jika bot memicu status gagal/waktu 8 menit habis
        if (data.mode === "failed") {
          clearInterval(progressInterval);
          document.getElementById("overlay").style.display = "none";
          loadingStarted = false;
          percent = 1;
          document.getElementById("percentText").innerHTML = "1%";
          
          // Memunculkan PopUp Kegagalan
          const toast = document.getElementById("toastGagal");
          toast.style.display = "block";
          setTimeout(() => { toast.style.display = "none"; }, 5000);
        }

        // Jika perintah /stop dikirim dari Telegram
        if (data.mode === "waiting" && loadingStarted) {
          clearInterval(progressInterval);
          document.getElementById("overlay").style.display = "none";
          loadingStarted = false;
          percent = 1;
          document.getElementById("percentText").innerHTML = "1%";
        }
      } catch (err) {
        console.log("Error Polling:", err);
      }
    }
    setInterval(cekStatus, 2000);
  </script>
</body>
</html>
